<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Task Manager</title>

  <style>
    /* --- CSS VARIABLES (Dynamic Theming) --- */
    :root {
      /* DARK THEME (Default) */
      --bg: #0b1220; 
      --card: #101a33; 
      --card-trans: rgba(16,26,51,.85);
      --text: #eaf0ff; 
      --muted: #93a4c7; 
      --line: rgba(255,255,255,.10);
      --accent: #5eead4; 
      --accent2: #60a5fa; 
      --danger: #fb7185;
      --shadow: 0 18px 50px rgba(0,0,0,.45); 
      --radius: 18px;
      
      /* Specific UI Elements */
      --input-bg: #1a243d; 
      --btn-text: #062018; 
      --pill-bg: rgba(255,255,255,0.1); 
      --progress-bg: rgba(255,255,255,.08);
      --urgent-bg: rgba(239, 68, 68, 0.2); 
      --urgent-text: #fca5a5;
      --import-bg: rgba(245, 158, 11, 0.2); 
      --import-text: #fcd34d;
      --modal-bg: rgba(0,0,0,0.7);
    }

    body.light-mode {
      /* LIGHT THEME */
      --bg: #f8fafc; 
      --card: #ffffff; 
      --card-trans: rgba(255,255,255,.95);
      --text: #0f172a; 
      --muted: #64748b; 
      --line: rgba(15,23,42,.1);
      --accent: #0ea5e9; /* Deepened for contrast */
      --accent2: #3b82f6; 
      --danger: #e11d48;
      --shadow: 0 8px 30px rgba(0,0,0,.06); 
      
      /* Specific UI Elements */
      --input-bg: #f1f5f9; 
      --btn-text: #ffffff;
      --pill-bg: rgba(15,23,42,0.06); 
      --progress-bg: rgba(15,23,42,.08);
      --urgent-bg: rgba(225, 29, 72, 0.1); 
      --urgent-text: #e11d48;
      --import-bg: rgba(217, 119, 6, 0.1); 
      --import-text: #d97706;
      --modal-bg: rgba(15,23,42,0.4);
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0; min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background-color: var(--bg);
      color: var(--text);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Keep the glowing orbs only for dark mode */
    body:not(.light-mode) {
      background: radial-gradient(1200px 600px at 15% 10%, rgba(94,234,212,.18), transparent 55%),
                  radial-gradient(900px 500px at 90% 20%, rgba(96,165,250,.18), transparent 55%),
                  radial-gradient(900px 700px at 40% 100%, rgba(139,92,246,.12), transparent 60%),
                  var(--bg);
    }

    /* --- View Containers --- */
    #loginView, #appView { display: none; padding: 14px; }
    #loginView.active, #appView.active { display: block; }

    /* --- Login Styles --- */
    .login-wrap { width: 100%; max-width: 460px; margin: 8vh auto 0; }
    .brand { text-align: center; margin-bottom: 14px; }
    .brand h1 { margin: 0; font-size: 26px; }
    .brand .sub { margin-top: 6px; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .card { border: 1px solid var(--line); border-radius: var(--radius); background: var(--card-trans); box-shadow: var(--shadow); padding: 16px; transition: background-color 0.3s, border-color 0.3s; }
    label { display: block; font-weight: 800; font-size: 12px; color: var(--muted); margin: 10px 0 6px; text-transform: uppercase;}
    
    input, select, textarea { 
      width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--line); 
      background: var(--input-bg); color: var(--text); outline: none; font-size: 15px; font-family: inherit; margin-bottom: 8px;
      transition: background-color 0.3s, color 0.3s;
    }
    select option { background: var(--card); color: var(--text); }
    
    .btn { width: 100%; margin-top: 14px; border: none; padding: 12px 14px; border-radius: 14px; cursor: pointer; font-weight: 900; color: var(--btn-text); background: linear-gradient(135deg, var(--accent), var(--accent2)); font-size: 15px; transition: opacity 0.2s;}
    .btn:disabled { opacity: .7; cursor: not-allowed; filter: grayscale(.1); }
    .msg { margin-top: 10px; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--line); font-size: 13px; display: none; }
    .msg.ok { display: block; border-color: rgba(94,234,212,.30); color: #0d9488; background: rgba(94,234,212,.15); }
    body:not(.light-mode) .msg.ok { color: #ccfbf1; background: rgba(94,234,212,.06); }
    
    .msg.error { display: block; border-color: rgba(251,113,133,.35); color: #e11d48; background: rgba(251,113,133,.15); }
    body:not(.light-mode) .msg.error { color: #fecdd3; background: rgba(251,113,133,.08); }

    /* --- App Styles --- */
    .app-wrap { max-width: 900px; margin: 0 auto; }
    .topbar { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 14px; border-radius: 14px; border: 1px solid var(--line); margin-bottom: 14px; transition: background-color 0.3s, border-color 0.3s; }
    .panel { background: var(--card); padding: 14px; border-radius: 14px; border: 1px solid var(--line); margin-bottom: 14px; transition: background-color 0.3s, border-color 0.3s; }
    
    .btnGhost { background: none; border: 1px solid var(--line); padding: 8px 12px; border-radius: 10px; cursor: pointer; color: var(--text); font-weight: bold; transition: background-color 0.2s; }
    .btnGhost:hover { background: var(--pill-bg); }
    
    .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .controls input, .controls select { flex: 1; min-width: 140px; margin-bottom: 0; padding: 10px;}
    .controls .btn { width: auto; margin-top: 0; padding: 10px 16px; }

    .progressBar { height: 12px; background: var(--progress-bg); border-radius: 999px; overflow: hidden; margin-top: 6px; }
    .progressFill { height: 100%; border-radius: 999px; transition: width 0.4s ease; }
    .fillRed { background: var(--danger); } .fillAmber { background: #f59e0b; } .fillGreen { background: #10b981; }
    
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 10px; border-bottom: 1px solid var(--line); text-align: left;}
    tr { cursor: pointer; transition: background 0.2s; }
    tr:hover { background: var(--pill-bg); }
    
    .cards { display: none; }
    .taskCard { background: var(--card); padding: 14px; border-radius: 14px; border: 1px solid var(--line); margin-bottom: 12px; cursor: pointer; transition: border-color 0.2s; }
    .taskCard:hover { border-color: var(--accent); }
    
    .pill { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; background: var(--pill-bg); margin-top: 4px; }
    .pill.urgent { background: var(--urgent-bg); color: var(--urgent-text); }
    .pill.important { background: var(--import-bg); color: var(--import-text); }

    /* --- Modals --- */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--modal-bg); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 14px; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--line); border-radius: 18px; width: 100%; max-width: 500px; padding: 20px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-header h2 { margin: 0; font-size: 20px; }
    .close-btn { background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; line-height: 1; }
    
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    
    @media(max-width: 700px) {
      table { display: none; }
      .cards { display: block; }
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="loginView">
    <button class="btnGhost theme-toggle-btn" onclick="toggleTheme()" style="position: absolute; top: 20px; right: 20px; padding: 8px 12px; font-size: 16px; border-radius: 50%; z-index: 10;">☀️</button>
    <div class="login-wrap">
      <div class="brand">
        <h1>Task Manager</h1>
        <div class="sub">April 2026 Program</div>
      </div>
      <div class="card">
        <label>Username</label>
        <input id="u" autocomplete="username" placeholder="e.g. admin" />
        <label>Password</label>
        <input id="p" type="password" autocomplete="current-password" placeholder="••••••••" />
        <button class="btn" id="btn" onclick="submitLogin()">Sign in</button>
        <div id="msg" class="msg"></div>
      </div>
    </div>
  </div>

  <div id="appView">
    <div class="app-wrap">
      <div class="topbar">
        <div>
          <b id="appName">Task Manager</b>
          <div id="who" class="pill" style="margin-top:2px;"></div>
        </div>
        <div style="display:flex; gap: 10px; align-items: center;">
          <button class="btnGhost theme-toggle-btn" onclick="toggleTheme()" style="padding: 8px 12px; font-size: 16px; border-radius: 50%;">☀️</button>
          <button class="btnGhost" onclick="signOut()">Sign out</button>
        </div>
      </div>

      <div class="controls panel">
        <input type="text" id="filterSearch" placeholder="Search Task #..." onkeyup="applyFilters()">
        <select id="filterPriority" onchange="applyFilters()"></select>
        <select id="filterDept" onchange="applyFilters()" class="hidden"></select>
        <button class="btn" onclick="openNewTaskModal()">+ New Task</button>
      </div>

      <div class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div style="display:flex; align-items:center; gap:10px;">
            <b id="progressTitle">Overall Progress</b>
            <button id="deptToggleBtn" class="btnGhost hidden" onclick="toggleDeptProgress()" style="padding: 4px 8px; font-size: 11px;">▼ Show Depts</button>
          </div>
          <span id="progressText" style="font-weight:bold; color:var(--accent);">0%</span>
        </div>
        <div class="progressBar">
          <div id="progressBar" class="progressFill fillGreen" style="width:0%"></div>
        </div>
        <div id="deptProgressContainer" class="hidden" style="margin-top:14px; padding-top:14px; border-top:1px solid var(--line);"></div>
      </div>

      <div class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <b style="font-size:16px;">Task List</b>
          <span id="taskCountText" class="pill" style="margin-top:0;">0 of 0 tasks</span>
        </div>
        
        <table>
          <thead>
            <tr><th>ID</th><th>Department</th><th>Title</th><th>Priority</th><th>Status</th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div id="cards" class="cards"></div>
      </div>
    </div>
  </div>

  <div id="taskModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Task Details</h2>
        <button class="close-btn" onclick="closeModals()">&times;</button>
      </div>
      
      <div class="grid-2">
        <div><label>Task ID</label><div id="mt-id" style="margin-bottom:12px; font-weight:bold;"></div></div>
        <div><label>Date</label><div id="mt-date" style="margin-bottom:12px; color:var(--muted);"></div></div>
      </div>
      
      <label>Department</label>
      <div id="mt-dept" style="margin-bottom:12px;"></div>
      
      <label>Description</label>
      <div id="mt-desc" style="margin-bottom:16px; background:var(--input-bg); padding:10px; border-radius:8px; border: 1px solid var(--line); font-size:14px; white-space:pre-wrap;"></div>

      <div class="grid-2">
        <div><label>Priority</label><div id="mt-priority" style="margin-bottom:12px;"></div></div>
        <div><label>Update Status (0-5)</label><select id="mt-status"></select></div>
      </div>

      <label>Add Remark / Note</label>
      <textarea id="mt-remark" rows="2" placeholder="Optional updates..."></textarea>
      
      <div style="display:flex; gap:10px;">
        <button class="btn" id="mt-btn" style="flex:2;" onclick="submitTaskUpdate()">Save Updates</button>
        <button class="btnGhost hidden" id="mt-delete-btn" style="flex:1; margin-top:14px; color:var(--danger); border-color:var(--danger);" onclick="deleteCurrentTask()">Delete</button>
      </div>
      <div id="mt-msg" class="msg"></div>
    </div>
  </div>

  <div id="newModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Create New Task</h2>
        <button class="close-btn" onclick="closeModals()">&times;</button>
      </div>
      
      <div id="nm-dept-container" class="hidden">
        <label>Assign to Department</label>
        <select id="nm-dept"></select>
      </div>
      
      <div id="nm-dept-readonly-container" class="hidden" style="margin-bottom: 12px;">
        <label>Department</label>
        <div id="nm-dept-readonly" style="font-weight: bold; padding: 12px; background: var(--input-bg); border-radius: 12px; border: 1px solid var(--line); color: var(--muted);"></div>
      </div>

      <label>Task Title</label>
      <input type="text" id="nm-title" placeholder="Brief summary...">

      <label>Description</label>
      <textarea id="nm-desc" rows="3" placeholder="Full details..."></textarea>

      <div class="grid-2">
        <div><label>Priority</label><select id="nm-priority"></select></div>
        <div><label>Initial Status</label><select id="nm-status"></select></div>
      </div>

      <button class="btn" id="nm-btn" onclick="submitNewTask()">Create Task</button>
      <div id="nm-msg" class="msg"></div>
    </div>
  </div>

  <div id="confirmDeleteModal" class="modal-overlay" style="z-index: 200;">
    <div class="modal" style="max-width: 380px; text-align: center; padding: 30px 20px;">
      <h2 style="margin-top: 0; color: var(--danger); font-size: 22px;">Delete Task?</h2>
      <p style="color: var(--muted); margin: 16px 0 24px; line-height: 1.5;">
        Are you sure you want to permanently delete Task <b id="cd-taskId" style="color:var(--text);"></b>?<br>This action cannot be undone.
      </p>
      <div style="display: flex; gap: 12px;">
        <button class="btnGhost" style="flex: 1; padding: 12px;" onclick="closeConfirmDelete()">Cancel</button>
        <button class="btn" id="confirm-delete-btn" style="flex: 1; background: var(--danger); color: #fff; padding: 12px; border: none;" onclick="executeDelete()">Yes, Delete</button>
      </div>
    </div>
  </div>

<script>
  // ==========================================
  // IMPORTANT: PASTE YOUR GOOGLE WEB APP URL HERE
  // ==========================================
  const API_URL = "https://script.google.com/macros/s/AKfycbzte0421-vAU-yWJdwg31ZpmabhbJqo0GKJ2052_CFzn0SUIqf1gx791S3cA1CZIPk/exec";
  
  const state = { 
    token: "", 
    tasks: [], 
    filteredTasks: [],
    user: null,
    isAdmin: false,
    lookups: null,
    currentTaskId: null 
  };

  // --- Theme Toggle Logic ---
  function toggleTheme() {
    const isLight = document.body.classList.toggle("light-mode");
    localStorage.setItem("tm_theme", isLight ? "light" : "dark");
    
    // Update all theme toggle buttons on the screen
    const icon = isLight ? "🌙" : "☀️";
    document.querySelectorAll(".theme-toggle-btn").forEach(btn => btn.innerText = icon);
  }

  // --- Core API Fetcher ---
  async function apiCall(action, payload = {}) {
    try {
      const response = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: action, token: state.token, payload: payload })
      });
      return await response.json();
    } catch (err) {
      console.error(err);
      return { ok: false, error: "Network error or server is offline." };
    }
  }

  // --- Initialization & View Management ---
  document.addEventListener("DOMContentLoaded", () => {
    // Check saved theme
    if (localStorage.getItem("tm_theme") === "light") {
      document.body.classList.add("light-mode");
      document.querySelectorAll(".theme-toggle-btn").forEach(btn => btn.innerText = "🌙");
    }

    state.token = sessionStorage.getItem("tm_token");
    if (state.token) loadDashboardData();
    else switchView("loginView");
  });

  function switchView(viewId) {
    document.getElementById("loginView").classList.remove("active");
    document.getElementById("appView").classList.remove("active");
    document.getElementById(viewId).classList.add("active");
  }

  function setMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = "msg " + (type || "");
    el.textContent = text || "";
    el.style.display = text ? "block" : "none";
  }

  // --- Login Logic ---
  async function submitLogin() {
    const u = document.getElementById("u").value.trim();
    const p = document.getElementById("p").value;
    document.getElementById("btn").disabled = true;
    setMsg("msg", "ok", "Signing in…");

    const res = await apiCall("login", { username: u, password: p });
    
    if (!res.ok) {
      document.getElementById("btn").disabled = false;
      setMsg("msg", "error", res.error || "Login failed.");
      return;
    }

    sessionStorage.setItem("tm_token", res.token);
    state.token = res.token;
    document.getElementById("u").value = "";
    document.getElementById("p").value = "";
    setMsg("msg", "", "");
    loadDashboardData();
  }

  // --- Dashboard Data Fetching ---
  async function loadDashboardData() {
    const res = await apiCall("getTasksBootstrap");

    if (!res.ok) { signOut(); return; }

    state.tasks = res.tasks;
    state.user = res.user;
    state.isAdmin = res.isAdmin;
    state.lookups = res.lookups;

    const roleText = state.isAdmin ? state.user.Role : state.user.Department;
    document.getElementById("who").innerText = `${state.user.DisplayName} • ${roleText}`;

    populateDropdown("filterPriority", state.lookups.priorities, true, "All Priorities");
    populateDropdown("nm-priority", state.lookups.priorities);
    populateDropdown("mt-status", state.lookups.statuses);
    populateDropdown("nm-status", state.lookups.statuses);
    
    const filterDept = document.getElementById("filterDept");
    if (state.isAdmin) {
      filterDept.classList.remove("hidden");
      populateDropdown("filterDept", state.lookups.departments, true, "All Departments");
      document.getElementById("nm-dept-container").classList.remove("hidden");
      document.getElementById("nm-dept-readonly-container").classList.add("hidden");
      populateDropdown("nm-dept", state.lookups.departments);
    } else {
      filterDept.classList.add("hidden");
      document.getElementById("nm-dept-container").classList.add("hidden");
      document.getElementById("nm-dept-readonly-container").classList.remove("hidden");
      document.getElementById("nm-dept-readonly").innerText = state.user.Department + " (Auto-assigned)";
    }

    applyFilters(); 
    switchView("appView");
  }

  function populateDropdown(id, arr, includeAll = false, allText = "All") {
    const el = document.getElementById(id);
    let html = includeAll ? `<option value="All">${allText}</option>` : "";
    html += arr.map(item => `<option value="${item}">${item}</option>`).join("");
    el.innerHTML = html;
  }

  // --- Filtering & Rendering ---
  function applyFilters() {
    const search = document.getElementById("filterSearch").value.trim().toLowerCase();
    const priority = document.getElementById("filterPriority").value;
    const dept = state.isAdmin ? document.getElementById("filterDept").value : "All";

    state.filteredTasks = state.tasks.filter(t => {
      const matchSearch = String(t.Task_ID).includes(search);
      const matchPriority = priority === "All" || t.Priority === priority;
      const matchDept = dept === "All" || t.Department === dept;
      return matchSearch && matchPriority && matchDept;
    });

    const pMap = { "Urgent": 3, "Important": 2, "Standard": 1 };
    state.filteredTasks.sort((a, b) => {
      const pA = pMap[a.Priority] || 0;
      const pB = pMap[b.Priority] || 0;
      if (pA !== pB) return pB - pA; 
      return parseInt(b.Task_ID || 0) - parseInt(a.Task_ID || 0); 
    });

    if (state.isAdmin) {
      document.getElementById("progressTitle").innerText = dept === "All" ? "Overall Progress" : `${dept} Progress`;
    } else {
      document.getElementById("progressTitle").innerText = `${state.user.Department} Progress`;
    }

    renderProgress();
    renderTasks();
  }

  function toggleDeptProgress() {
    const container = document.getElementById("deptProgressContainer");
    const btn = document.getElementById("deptToggleBtn");
    if (container.classList.contains("hidden")) {
      container.classList.remove("hidden");
      btn.innerText = "▲ Hide Depts";
    } else {
      container.classList.add("hidden");
      btn.innerText = "▼ Show Depts";
    }
  }

  function renderProgress() {
    let total = 0;
    state.filteredTasks.forEach(t => { total += parseInt(t.Status || 0); });
    const maxScore = state.filteredTasks.length * 5; 
    let pct = maxScore > 0 ? Math.round((total / maxScore) * 100) : 0;

    document.getElementById("progressText").innerText = pct + "%";
    const bar = document.getElementById("progressBar");
    bar.style.width = pct + "%";
    bar.className = "progressFill " + (pct <= 30 ? "fillRed" : pct <= 70 ? "fillAmber" : "fillGreen");

    const deptFilter = document.getElementById("filterDept") ? document.getElementById("filterDept").value : "All";
    const toggleBtn = document.getElementById("deptToggleBtn");
    const deptContainer = document.getElementById("deptProgressContainer");

    if (state.isAdmin && deptFilter === "All") {
      toggleBtn.classList.remove("hidden");
      let breakdownHtml = "";
      state.lookups.departments.forEach(deptName => {
        const deptTasks = state.tasks.filter(t => t.Department === deptName); 
        let dTotal = 0;
        deptTasks.forEach(t => { dTotal += parseInt(t.Status || 0); });
        
        const dMax = deptTasks.length * 5;
        const dPct = dMax > 0 ? Math.round((dTotal / dMax) * 100) : 0;
        const dColor = dPct <= 30 ? "fillRed" : dPct <= 70 ? "fillAmber" : "fillGreen";

        breakdownHtml += `<div style="margin-bottom:12px;"><div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; font-weight:bold;"><span style="color:var(--muted);">${deptName}</span><span>${dPct}%</span></div><div class="progressBar" style="margin-top:0; height:6px;"><div class="progressFill ${dColor}" style="width:${dPct}%"></div></div></div>`;
      });
      deptContainer.innerHTML = breakdownHtml;
    } else {
      toggleBtn.classList.add("hidden");
      deptContainer.classList.add("hidden");
      toggleBtn.innerText = "▼ Show Depts";
    }
  }

  function renderTasks() {
    document.getElementById("taskCountText").innerText = `${state.filteredTasks.length} of ${state.tasks.length} tasks`;
    const tbody = document.getElementById("tbody");
    const cards = document.getElementById("cards");
    tbody.innerHTML = ""; cards.innerHTML = "";

    state.filteredTasks.forEach(t => {
      const idStr = String(t.Task_ID).padStart(3, "0");
      const score = parseInt(t.Status || 0);
      const pct = (score / 5) * 100;
      const color = score <= 1 ? "fillRed" : score <= 3 ? "fillAmber" : "fillGreen";
      const pClass = String(t.Priority).toLowerCase() === "urgent" ? "urgent" : String(t.Priority).toLowerCase() === "important" ? "important" : "";

      tbody.innerHTML += `<tr onclick="openTaskModal('${t.Task_ID}')"><td style="font-weight:bold;">#${idStr}</td><td>${t.Department}</td><td>${t.Title}</td><td><span class="pill ${pClass}">${t.Priority}</span></td><td><div style="display:flex; align-items:center; gap:8px;"><span>${score}/5</span><div class="progressBar" style="width:60px; margin-top:0;"><div class="progressFill ${color}" style="width:${pct}%"></div></div></div></td></tr>`;
      
      cards.innerHTML += `<div class="taskCard" onclick="openTaskModal('${t.Task_ID}')"><div style="display:flex; justify-content:space-between;"><b>#${idStr} ${t.Title}</b><span class="pill ${pClass}">${t.Priority}</span></div><div class="pill">${t.Department}</div><div class="pill">Status ${score}/5</div><div class="progressBar"><div class="progressFill ${color}" style="width:${pct}%"></div></div></div>`;
    });
  }

  // --- Modals & Data Modification ---
  function openTaskModal(taskId) {
    const task = state.tasks.find(t => parseInt(t.Task_ID, 10) === parseInt(taskId, 10));
    if (!task) return;
    state.currentTaskId = taskId;

    document.getElementById("modalTitle").innerText = task.Title;
    document.getElementById("mt-id").innerText = "#" + String(task.Task_ID).padStart(3, "0");
    document.getElementById("mt-date").innerText = formatDateLocal(task.Date);
    document.getElementById("mt-dept").innerText = task.Department;
    document.getElementById("mt-desc").innerText = task.Description || "No description provided.";
    document.getElementById("mt-priority").innerText = task.Priority;
    
    document.getElementById("mt-status").value = task.Status || "0";
    document.getElementById("mt-remark").value = ""; 
    setMsg("mt-msg", "", "");

    if (state.isAdmin) document.getElementById("mt-delete-btn").classList.remove("hidden");
    else document.getElementById("mt-delete-btn").classList.add("hidden");

    document.getElementById("taskModal").classList.add("active");
  }

  async function submitTaskUpdate() {
    const btn = document.getElementById("mt-btn");
    btn.disabled = true; btn.innerText = "Updating...";

    const newStatus = document.getElementById("mt-status").value;

    const res = await apiCall("updateTaskStatus", {
      Task_ID: state.currentTaskId,
      Status: newStatus,
      Remark: document.getElementById("mt-remark").value.trim()
    });

    btn.disabled = false; btn.innerText = "Save Updates";
    if (!res.ok) { setMsg("mt-msg", "error", res.error); return; }
    
    // Fix applied to force match ID numbers
    const tIndex = state.tasks.findIndex(t => parseInt(t.Task_ID, 10) === parseInt(state.currentTaskId, 10));
    
    if (tIndex > -1) {
      state.tasks[tIndex].Status = newStatus;
      if (res.Last_update) state.tasks[tIndex].Last_update = res.Last_update;
    }
    
    closeModals(); 
    applyFilters(); 
  }

  function openNewTaskModal() {
    document.getElementById("nm-title").value = "";
    document.getElementById("nm-desc").value = "";
    document.getElementById("nm-priority").selectedIndex = 0;
    document.getElementById("nm-status").value = "0";
    setMsg("nm-msg", "", "");
    document.getElementById("newModal").classList.add("active");
  }

  async function submitNewTask() {
    const title = document.getElementById("nm-title").value.trim();
    if (!title) { setMsg("nm-msg", "error", "Title is required."); return; }

    const btn = document.getElementById("nm-btn");
    btn.disabled = true; btn.innerText = "Creating...";

    const payload = {
      Title: title,
      Description: document.getElementById("nm-desc").value.trim(),
      Priority: document.getElementById("nm-priority").value,
      Status: document.getElementById("nm-status").value
    };
    if (state.isAdmin) payload.Department = document.getElementById("nm-dept").value;

    const res = await apiCall("createTask", payload);

    btn.disabled = false; btn.innerText = "Create Task";
    if (!res.ok) { setMsg("nm-msg", "error", res.error); return; }
    
    closeModals(); loadDashboardData(); 
  }

  function deleteCurrentTask() {
    const idStr = String(state.currentTaskId).padStart(3, '0');
    document.getElementById("cd-taskId").innerText = "#" + idStr;
    document.getElementById("confirmDeleteModal").classList.add("active");
  }

  function closeConfirmDelete() { document.getElementById("confirmDeleteModal").classList.remove("active"); }
  function closeModals() { document.querySelectorAll(".modal-overlay").forEach(m => m.classList.remove("active")); }

  async function executeDelete() {
    const btn = document.getElementById("confirm-delete-btn");
    btn.disabled = true; btn.innerText = "Deleting...";

    const res = await apiCall("deleteTask", { taskId: state.currentTaskId });

    btn.disabled = false; btn.innerText = "Yes, Delete";
    if (!res.ok) { setMsg("mt-msg", "error", res.error); closeConfirmDelete(); return; }
    
    state.tasks = state.tasks.filter(t => parseInt(t.Task_ID, 10) !== parseInt(res.Task_ID, 10));
    closeModals(); applyFilters(); 
  }

  function signOut() {
    sessionStorage.removeItem("tm_token");
    state.token = ""; state.tasks = []; state.user = null;
    switchView("loginView"); document.getElementById("btn").disabled = false;
  }

  function formatDateLocal(dateStr) {
    if (!dateStr) return "N/A";
    if (String(dateStr).includes("/")) return dateStr;
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    const dateObj = new Date(d.toLocaleString('en-US', { timeZone: 'Asia/Bangkok' }));
    return `${String(dateObj.getDate()).padStart(2, '0')}/${String(dateObj.getMonth() + 1).padStart(2, '0')}/${String(dateObj.getFullYear()).slice(-2)}`; 
  }
</script>
</body>
</html>
